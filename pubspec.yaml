name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: ./school_learning_app

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🦋 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🧹 Clean project
        run: flutter clean

      - name: 🔨 Build release APK
        run: flutter build apk --release

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rawdat-al-noor-release
          path: school_learning_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
